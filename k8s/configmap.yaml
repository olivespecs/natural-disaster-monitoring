apiVersion: v1
kind: ConfigMap
metadata:
  name: nava-ai-config
  namespace: nava-ai
data:
  REDIS_URL: redis://redis:6379
  EONET_API_URL: https://eonet.gsfc.nasa.gov/api/v3
  POLL_INTERVAL_SECONDS: "60"
  MAX_EVENTS_PER_POLL: "50"
  EVENT_DAYS_WINDOW: "7"
  EONET_TIMEOUT_SECONDS: "30"
  EONET_MAX_RETRIES: "3"
  EONET_RETRY_BACKOFF_SECONDS: "1.2"
  JOB_MAX_RETRIES: "2"
  MAX_QUEUE_DEPTH: "500"
  INFERENCE_BATCH_SIZE: "8"
  GEMINI_MODEL: gemma-4-26b-a4b-it
