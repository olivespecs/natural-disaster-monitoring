apiVersion: apps/v1
kind: Deployment
metadata:
  name: nava-api
  namespace: nava-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nava-api
  template:
    metadata:
      labels:
        app: nava-api
    spec:
      containers:
      - name: api
        image: nava-ai:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: nava-ai-config
        - secretRef:
            name: nava-ai-secrets
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 8
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
