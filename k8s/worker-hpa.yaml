apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: nava-worker-queue-depth
  namespace: nava-ai
spec:
  scaleTargetRef:
    name: nava-worker
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
  - type: redis
    metadata:
      address: redis.nava-ai.svc.cluster.local:6379
      listName: rq:queue:eonet-inference
      listLength: "20"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nava-worker-fallback-hpa
  namespace: nava-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nava-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
